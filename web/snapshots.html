<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>凯尔希状态机 - 状态历史</title>
  <link rel="stylesheet" href="/static/style.css?v=20260324">
</head>
<body>
  <nav>
    <span class="logo">Kal'tsit State Machine</span>
    <a href="/">仪表盘</a>
    <a href="/guide">使用指南</a>
    <a href="/snapshots-history" class="active">状态历史</a>
    <a href="/events-history">事件历史</a>
    <a href="/key-records">关键记录</a>
    <a href="/settings">设定管理</a>
    <a href="/evolution">人格演化</a>
    <a href="/vectors">向量管理</a>
  </nav>

  <div class="container">
    <div style="display:flex; gap:12px; margin-bottom:16px; align-items:center;">
      <input type="text" id="search-input" placeholder="搜索快照内容…"
             style="flex:1" onkeydown="if(event.key==='Enter')runSearch()">
      <button class="btn btn-primary" onclick="runSearch()">搜索</button>
      <button class="btn" onclick="triggerSnapshot()">手动创建快照</button>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <div class="btn-group">
        <button class="btn" id="toggle-manage-btn" onclick="toggleHistoryManageMode()">开启选择管理</button>
        <button class="btn" onclick="selectAllHistoryItems()">全选当前列表</button>
        <button class="btn" onclick="clearHistorySelection()">清空选择</button>
        <button class="btn btn-danger" onclick="deleteSelectedHistoryItems()">删除勾选</button>
        <select id="history-export-format" style="max-width:120px;">
          <option value="txt">TXT</option>
          <option value="md">MD</option>
          <option value="json">JSON</option>
        </select>
        <button class="btn btn-primary" onclick="exportSelectedHistoryItems()">导出勾选</button>
      </div>
      <div class="list-meta" id="history-selection-summary" style="margin-top:8px;">管理模式未开启</div>
    </div>

    <div class="card" style="padding:0">
      <div id="data-list"><div class="loading">加载中…</div></div>
    </div>
  </div>

  <div class="status-bar" id="status-bar">就绪</div>

  <script src="/static/app.js?v=20260324"></script>
  <script>initSnapshotsHistoryPage();</script>
</body>
</html>
