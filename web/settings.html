<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="/static/favicon.jpg?v=950ceae3">
  <link rel="apple-touch-icon" href="/static/favicon.jpg?v=950ceae3">
  <title>凯尔希状态机 - 设定管理</title>
  <link rel="stylesheet" href="/static/style.css?v=20260326">
</head>
<body>
  <nav>
    <span class="logo">Kal'tsit State Machine</span>
    <a href="/">仪表盘</a>
    <a href="/guide">使用指南</a>
    <a href="/snapshots-history">状态历史</a>
    <a href="/events-history">事件历史</a>
    <a href="/key-records">关键记录</a>
    <a href="/settings" class="active">设定管理</a>
    <a href="/environment-manage">环境管理</a>
    <a href="/evolution">人格演化</a>
    <a href="/vectors">向量管理</a>
  </nav>

  <div class="container">
    <div class="tabs">
      <div class="tab active" data-tab="persona" onclick="switchSettingsTab('persona')">人格设定</div>
      <div class="tab" data-tab="prompts" onclick="switchSettingsTab('prompts')">Prompt 与参数</div>
      <div class="tab" data-tab="models" onclick="switchSettingsTab('models')">模型调用</div>
      <div class="tab" data-tab="import" onclick="switchSettingsTab('import')">数据导入</div>
    </div>

    <div id="settings-tab-persona">
      <div class="card">
        <h2>L1 稳定层</h2>
        <div class="grid-2">
          <div class="form-group"><label>L1_character_background</label><textarea id="setting-L1_character_background" style="min-height:160px;"></textarea></div>
          <div class="form-group"><label>L1_user_background</label><textarea id="setting-L1_user_background" style="min-height:160px;"></textarea></div>
        </div>
      </div>

      <div class="card">
        <h2>L2 动态层</h2>
        <div class="grid-2">
          <div class="form-group"><label>L2_character_personality</label><textarea id="setting-L2_character_personality" style="min-height:160px;"></textarea></div>
          <div class="form-group"><label>L2_relationship_dynamics</label><textarea id="setting-L2_relationship_dynamics" style="min-height:160px;"></textarea></div>
          <div class="form-group"><label>L2_life_status</label><textarea id="setting-L2_life_status" style="min-height:160px;"></textarea></div>
        </div>
      </div>

      <div class="card"><div class="btn-group"><button class="btn btn-primary" onclick="savePersonaSettings()">保存人格设定</button><button class="btn" onclick="loadSettingsPage()">刷新</button></div></div>
    </div>

    <div id="settings-tab-prompts" style="display:none;">
      <div class="card">
        <h2>Prompt 模板</h2>
        <div class="grid-2">
          <div class="form-group"><div class="label-row"><label>prompt_snapshot_generation</label><button type="button" class="btn btn-mini" onclick="applyPromptDefault('prompt_snapshot_generation')">填入默认</button></div><textarea id="setting-prompt_snapshot_generation"></textarea></div>
          <div class="form-group"><div class="label-row"><label>prompt_event_anchor</label><button type="button" class="btn btn-mini" onclick="applyPromptDefault('prompt_event_anchor')">填入默认</button></div><textarea id="setting-prompt_event_anchor"></textarea></div>
          <div class="form-group"><div class="label-row"><label>prompt_reflect_snapshot</label><button type="button" class="btn btn-mini" onclick="applyPromptDefault('prompt_reflect_snapshot')">填入默认</button></div><textarea id="setting-prompt_reflect_snapshot"></textarea></div>
          <div class="form-group"><div class="label-row"><label>prompt_reflect_event</label><button type="button" class="btn btn-mini" onclick="applyPromptDefault('prompt_reflect_event')">填入默认</button></div><textarea id="setting-prompt_reflect_event"></textarea></div>
          <div class="form-group"><div class="label-row"><label>prompt_conversation_summary</label><button type="button" class="btn btn-mini" onclick="applyPromptDefault('prompt_conversation_summary')">填入默认</button></div><textarea id="setting-prompt_conversation_summary"></textarea></div>
          <div class="form-group"><div class="label-row"><label>prompt_periodic_review</label><button type="button" class="btn btn-mini" onclick="applyPromptDefault('prompt_periodic_review')">填入默认</button></div><textarea id="setting-prompt_periodic_review"></textarea></div>
          <div class="form-group"><div class="label-row"><label>prompt_evolution_summary</label><button type="button" class="btn btn-mini" onclick="applyPromptDefault('prompt_evolution_summary')">填入默认</button></div><textarea id="setting-prompt_evolution_summary"></textarea></div>
          <div class="form-group"><div class="label-row"><label>prompt_event_scoring</label><button type="button" class="btn btn-mini" onclick="applyPromptDefault('prompt_event_scoring')">填入默认</button></div><textarea id="setting-prompt_event_scoring"></textarea></div>
          <div class="form-group"><div class="label-row"><label>prompt_environment_generation</label><button type="button" class="btn btn-mini" onclick="applyPromptDefault('prompt_environment_generation')">填入默认</button></div><textarea id="setting-prompt_environment_generation"></textarea></div>
        </div>
      </div>

      <div class="card">
        <h2>向量与 API 配置</h2>
        <div class="grid-3">
          <div class="form-group"><label>vector_embedding_api_base</label><input type="text" id="setting-vector_embedding_api_base"></div>
          <div class="form-group"><label>vector_embedding_api_key</label><input type="text" id="setting-vector_embedding_api_key"></div>
          <div class="form-group"><label>vector_embedding_model</label><input type="text" id="setting-vector_embedding_model"></div>
        </div>
      </div>

      <div class="card">
        <h2>运行参数</h2>
        <div class="grid-3">
          <div class="form-group"><label>min_time_unit_hours（小时）</label><input type="text" id="setting-min_time_unit_hours" placeholder="例如 8、0.5、8h、8小时"></div>
          <div class="form-group"><label>inject_hot_events_limit</label><input type="text" id="setting-inject_hot_events_limit"></div>
          <div class="form-group"><label>vector_embedding_dim</label><input type="text" id="setting-vector_embedding_dim"></div>
          <div class="form-group"><label>vector_sync_batch_size</label><input type="text" id="setting-vector_sync_batch_size"></div>
          <div class="form-group"><label>vector_snapshot_days_threshold</label><input type="text" id="setting-vector_snapshot_days_threshold"></div>
          <div class="form-group"><label>vector_search_top_k</label><input type="text" id="setting-vector_search_top_k"></div>
          <div class="form-group"><label>vector_cold_days_threshold</label><input type="text" id="setting-vector_cold_days_threshold"></div>
          <div class="form-group"><label>vector_compaction_group_size</label><input type="text" id="setting-vector_compaction_group_size"></div>
          <div class="form-group"><label>vector_compaction_max_groups</label><input type="text" id="setting-vector_compaction_max_groups"></div>
          <div class="form-group"><label>automation_enabled</label><select id="setting-automation_enabled"><option value="true">开启</option><option value="false">关闭</option></select></div>
          <div class="form-group"><label>automation_vector_sync</label><select id="setting-automation_vector_sync"><option value="true">开启</option><option value="false">关闭</option></select></div>
          <div class="form-group"><label>automation_auto_evolution</label><select id="setting-automation_auto_evolution"><option value="true">开启</option><option value="false">关闭</option></select></div>
          <div class="form-group"><label>automation_cold_compaction</label><select id="setting-automation_cold_compaction"><option value="true">开启</option><option value="false">关闭</option></select></div>
          <div class="form-group"><label>automation_compaction_min_interval_hours</label><input type="text" id="setting-automation_compaction_min_interval_hours"></div>
          <div class="form-group"><label>snapshot_scheduler_enabled（后台按时间自动推进快照）</label><select id="setting-snapshot_scheduler_enabled"><option value="true">开启</option><option value="false">关闭</option></select></div>
          <div class="form-group"><label>snapshot_scheduler_interval_sec（后台轮询间隔，秒）</label><input type="text" id="setting-snapshot_scheduler_interval_sec" placeholder="60"></div>
        </div>
      </div>

      <div class="card"><div class="btn-group"><button class="btn btn-primary" onclick="saveAllSettings()">保存全部设定</button><button class="btn btn-danger" onclick="resetAllSettings()">恢复默认</button><button class="btn" onclick="loadSettingsPage()">刷新</button></div></div>
    </div>

    <div id="settings-tab-models" style="display:none;">
      <div class="card">
        <h2>主 LLM</h2>
        <div class="list-meta">用于人格演化总结等主生成任务。未填时回退 `config.yaml`。</div>
        <div class="grid-2">
          <div class="form-group">
            <label>模型名</label>
            <input id="runtime-llm-model" type="text" placeholder="例如 gpt-4o-mini">
          </div>
          <div class="form-group">
            <label>请求超时（秒）</label>
            <input id="runtime-llm-timeout-sec" type="number" min="1" step="1" placeholder="180">
          </div>
          <div class="form-group">
            <label>API Base</label>
            <input id="runtime-llm-api-base" type="text" placeholder="https://api.example.com/v1">
          </div>
          <div class="form-group">
            <label>API Key</label>
            <input id="runtime-llm-api-key" type="password" placeholder="sk-...">
          </div>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="saveRuntimeLLMConfig()">保存主 LLM 配置</button>
          <button class="btn" onclick="loadRuntimeLLMConfig()">刷新</button>
        </div>
      </div>

      <div class="card">
        <h2>环境生成专用 LLM</h2>
        <div class="list-meta">用于环境信息生成。未启用时自动回退主 LLM。</div>
        <div class="grid-2">
          <div class="form-group">
            <label>启用开关</label>
            <select id="env-llm-enabled">
              <option value="false">关闭</option>
              <option value="true">启用</option>
            </select>
          </div>
          <div class="form-group">
            <label>模型名</label>
            <input id="env-llm-model" type="text" placeholder="例如 gpt-4o-mini">
          </div>
          <div class="form-group">
            <label>API Base</label>
            <input id="env-llm-api-base" type="text" placeholder="https://api.example.com/v1">
          </div>
          <div class="form-group">
            <label>API Key</label>
            <input id="env-llm-api-key" type="password" placeholder="sk-...">
          </div>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="saveEnvironmentLLMConfig()">保存环境 LLM 配置</button>
          <button class="btn" onclick="loadEnvironmentLLMConfig()">刷新</button>
        </div>
      </div>

      <div class="card">
        <h2>快照与评分专用 LLM</h2>
        <div class="list-meta">用于快照生成、事件评分等流程。未启用时自动回退主 LLM。</div>
        <div class="grid-2">
          <div class="form-group">
            <label>启用开关</label>
            <select id="snapshot-llm-enabled">
              <option value="false">关闭</option>
              <option value="true">启用</option>
            </select>
          </div>
          <div class="form-group">
            <label>模型名</label>
            <input id="snapshot-llm-model" type="text" placeholder="例如 gpt-4o-mini">
          </div>
          <div class="form-group">
            <label>API Base</label>
            <input id="snapshot-llm-api-base" type="text" placeholder="https://api.example.com/v1">
          </div>
          <div class="form-group">
            <label>API Key</label>
            <input id="snapshot-llm-api-key" type="password" placeholder="sk-...">
          </div>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="saveSnapshotLLMConfig()">保存快照/评分 LLM 配置</button>
          <button class="btn" onclick="loadSnapshotLLMConfig()">刷新</button>
        </div>
      </div>

      <div class="card">
        <div class="btn-group">
          <button class="btn" onclick="loadModelSettingsPage()">刷新模型配置</button>
        </div>
      </div>
    </div>

    <div id="settings-tab-import" style="display:none;">
      <div class="card">
        <h2>一键批量导入</h2>
        <div class="form-group"><label>导入 JSON 文件</label><input type="file" id="bulk-import-file" accept=".json,application/json"></div>
        <div class="field-group">
          <div class="field-group-title">导入选项</div>
          <div style="display:flex; gap:20px; flex-wrap:wrap;">
            <label class="checkbox-label"><input type="checkbox" id="bulk-import-overwrite-settings" checked>覆盖已有设定</label>
            <label class="checkbox-label"><input type="checkbox" id="bulk-import-upsert-key-records" checked>关键记录按类型+标题 upsert</label>
            <label class="checkbox-label"><input type="checkbox" id="bulk-import-sync-vectors" checked>导入后自动同步向量</label>
          </div>
        </div>
        <div class="btn-group" style="margin-top:12px;"><button class="btn btn-primary" onclick="importBulkJson()">开始导入</button><button class="btn" onclick="downloadBulkImportTemplate()">下载导入模板</button></div>
        <div style="margin-top:14px;"><div class="list-meta" style="margin-bottom:6px;">导入结果</div><div id="bulk-import-result" class="detail-content" style="max-height:280px;">等待导入</div></div>
      </div>
    </div>
  </div>

  <div class="status-bar" id="status-bar">就绪</div>
  <script src="/static/app.js?v=20260326b"></script>
  <script>loadSettingsPage();</script>
</body>
</html>
