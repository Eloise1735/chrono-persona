# 复制本文件为 config.yaml 后填写真实值（config.yaml 已被 .gitignore 忽略）
server:
  host: "0.0.0.0"
  port: 8000

llm:
  api_base: "https://your-api-provider.com/v1"
  api_key: "your-api-key"
  model: "your-model-name"

database:
  path: "./data/kelsey.db"

environment:
  min_time_unit_hours: 24
  generator: "template"

character:
  # system_prompt_file: "./character_prompt.txt"
  # system_prompt: "你是凯尔希..."

memory_store:
  type: "vector"
  max_snapshots: 7
